<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News – CampusConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="navbar-container"></div>
    <section class="py-5" style="background:linear-gradient(135deg,#00acc1,#006064);min-height:220px;display:flex;align-items:center;">
        <div class="container text-white">
            <div class="d-inline-block badge-upcoming mb-3"><span class="small fw-medium"><i class="bi bi-newspaper me-1"></i>Campus News</span></div>
            <h1 class="display-4 fw-bold mb-2">Stay Informed</h1>
            <p class="lead mb-0" style="opacity:0.9;">The latest from your campus community.</p>
        </div>
    </section>
    <section class="py-5">
        <div class="container">
            <div class="text-center py-5 text-muted">
                <i class="bi bi-newspaper" style="font-size:3rem;display:block;margin-bottom:12px;color:var(--brand-teal);"></i>
                <h5 class="fw-semibold text-navy">News page coming soon!</h5>
                <p class="small">We're working hard on this. Check back shortly.</p>
                <a href="index.html" class="btn btn-purple rounded-3 mt-2 px-4">Back to Home</a>
            </div>
        </div>
    </section>
    <div id="footer-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/component-loader.js"></script>
