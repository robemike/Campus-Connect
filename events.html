<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events – CampusConnect</title>
    <meta name="description" content="Discover upcoming campus events — hackathons, career fairs, music festivals, and more.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="navbar-container"></div>
    <div id="events-hero-container"></div>

    <!-- Filter Pills -->
    <section class="py-4 bg-white border-bottom" id="events-filter-bar">
        <div class="container">
            <div class="filter-pills-wrapper d-flex flex-wrap gap-2 p-2 rounded-4">
                <a href="#" class="btn filter-pill active" data-filter="All">All</a>
                <a href="#" class="btn filter-pill" data-filter="Technology">Technology</a>
                <a href="#" class="btn filter-pill" data-filter="Career">Career</a>
                <a href="#" class="btn filter-pill" data-filter="Entertainment">Entertainment</a>
                <a href="#" class="btn filter-pill" data-filter="Business">Business</a>
                <a href="#" class="btn filter-pill" data-filter="Arts">Arts</a>
                <a href="#" class="btn filter-pill" data-filter="Wellness">Wellness</a>
            </div>
        </div>
    </section>

    <!-- Events List -->
    <section class="events-catalog py-5">
        <div class="container">
            <div id="events-catalog-container" class="d-flex flex-column gap-4">
                <div class="empty-state">
                    <i class="bi bi-arrow-clockwise" style="animation:spin 1s linear infinite;"></i>
                    <p>Loading events…</p>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/component-loader.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/events.js"></script>
    <script src="js/app.js"></script>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
