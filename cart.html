<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart – CampusConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="navbar-container"></div>

    <!-- Cart Hero -->
    <section class="py-5" style="background: linear-gradient(135deg, var(--hero-marketplace-start, #1e3a5f), var(--hero-marketplace-end, #2d6a9f));">
        <div class="container">
            <div class="d-flex align-items-center gap-3">
                <a href="marketplace.html" class="btn btn-outline-light btn-sm rounded-3">
                    <i class="bi bi-arrow-left me-1"></i> Back to Marketplace
                </a>
                <div>
                    <h1 class="fw-bold text-white mb-1" style="font-size:1.8rem;">
                        <i class="bi bi-bag me-2"></i>Your Cart
                    </h1>
                    <p class="text-white-50 mb-0 small">Review your selected items before contacting sellers.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Cart Content -->
    <section class="py-5 bg-light">
        <div class="container">
            <div class="row g-4">
                <!-- Cart Items Column -->
                <div class="col-lg-8">
                    <h5 class="fw-bold text-navy mb-4" id="cart-items-heading">Cart Items</h5>
                    <div class="row g-3" id="cart-page-container">
                        <!-- Rendered by cart.js -->
                        <div class="col-12 text-center py-5 text-muted">
                            <i class="bi bi-arrow-clockwise" style="font-size:2rem;animation:spin 1s linear infinite;display:block;margin-bottom:12px;"></i>
                            Loading cart…
                        </div>
                    </div>
                </div>

                <!-- Order Summary Column -->
                <div class="col-lg-4">
                    <div id="cart-summary">
                        <!-- Rendered by cart.js -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/component-loader.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
