<header class="marketplace-hero text-white py-5">
    <div class="container hero-content-wrapper">
        
        <div class="d-inline-block badge-marketplace mb-3">
            <span class="small fw-medium">Student Marketplace</span>
        </div>
        
        <h1 class="display-4 fw-bold mb-3">Buy & Sell with Students</h1>
        
        <p class="lead hero-description col-md-10 col-lg-7 mb-4">
            A trusted marketplace exclusively for students. Find great deals on textbooks, electronics, furniture, and services.
        </p>
        
        <div class="search-container-bar col-12 col-lg-8 p-2 rounded-3 bg-white shadow">
            <form class="row g-2 align-items-center m-0 w-100" onsubmit="return false;">
                
                <div class="col-md-6">
                    <div class="input-group input-group-custom">
                        <span class="input-group-text bg-transparent border-0 pe-1 text-muted">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" 
                               class="form-control bg-transparent border-0 ps-2 py-2 shadow-none text-dark" 
                               placeholder="Search for items...">
                    </div>
                </div>
                
                <div class="col-md-3 border-start-md">
                    <select class="form-select bg-transparent border-0 py-2 shadow-none text-muted fw-medium">
                        <option selected disabled>Category</option>
                        <option value="1">Textbooks</option>
                        <option value="2">Electronics</option>
                        <option value="3">Furniture</option>
                        <option value="4">Services</option>
                    </select>
                </div>
                
                <div class="col-md-3">
                    <button type="button" class="btn btn-search-submit d-flex align-items-center justify-content-center gap-2 w-100 py-2 fw-medium rounded-2 text-white">
                        <i class="bi bi-search"></i> Search
                    </button>
                </div>

            </form>
        </div>

    </div>
</header>
