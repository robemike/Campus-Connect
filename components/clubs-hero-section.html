<header class="clubs-hero-section text-white py-5">
    <div class="container hero-content-wrapper">
        
        <div class="d-inline-block badge-communities mb-3">
            <span class="small fw-medium">50+ Active Clubs</span>
        </div>
        
        <h1 class="display-4 fw-bold mb-3">Join Amazing Communities</h1>
        
        <p class="lead hero-description col-md-10 col-lg-7 mb-4">
            Connect with like-minded students, explore your passions, and build lifelong friendships.
        </p>
        
        <div class="row m-0 col-12 col-md-10 col-lg-7 p-0">
            <form class="d-flex flex-sm-row flex-column gap-2 w-100 p-0" onsubmit="return false;">
                <div class="input-group search-input-group flex-grow-1">
                    <span class="input-group-text bg-white border-0 pe-1 text-muted ps-3">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text" 
                           class="form-control border-0 ps-2 py-3 shadow-none rounded-end-3" 
                           placeholder="Search for clubs...">
                </div>
                <button type="button" class="btn btn-search-action px-4 py-2 fw-medium rounded-3 mt-sm-0 mt-2">
                    Search
                </button>
            </form>
        </div>

    </div>
</header>
