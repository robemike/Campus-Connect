<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace – CampusConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="navbar-container"></div>
    <div id="marketplace-hero-container"></div>
    <!-- Catalog -->
    <section class="marketplace-catalog py-5 bg-light" id="marketplace-catalog-section">
        <div class="container">
            <!-- Filter bar -->
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-5">
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-filter active" data-filter="All Items">All Items</button>
                    <button class="btn btn-filter" data-filter="Electronics">Electronics</button>
                    <button class="btn btn-filter" data-filter="Textbooks">Textbooks</button>
                    <button class="btn btn-filter" data-filter="Furniture">Furniture</button>
                    <button class="btn btn-filter" data-filter="Services">Services</button>
                </div>
                <button class="btn btn-post-listing px-4 py-2 fw-medium rounded-3">
                    <i class="bi bi-plus-lg me-1"></i> Post Listing
                </button>
            </div>
            <!-- Products Grid -->
            <div class="row g-4" id="product-catalog-container">
                <div class="col-12 text-center py-5 text-muted">
                    <i class="bi bi-arrow-clockwise" style="font-size:2rem;animation:spin 1s linear infinite;display:block;margin-bottom:12px;"></i>
                    Loading products…
                </div>
            </div>
        </div>
    </section>
    <div id="footer-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/component-loader.js"></script>
    <script src="js/marketplace.js"></script>
    <script src="js/events.js"></script>
    <script src="js/app.js"></script>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
